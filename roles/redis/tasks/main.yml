---
# tasks file for redis

- name: Install Redis
  apt:
    name: redis-server
    state: present
    update_cache: yes

- name: Configure Redis
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
  notify: Restart Redis

- name: Enable Redis
  service:
    name: redis
    state: started
    enabled: yes